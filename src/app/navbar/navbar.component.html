<mat-toolbar class="navbar">

    <span class="title" (click)="goHome()">SMS</span>

    <span class="spacer"></span>

    <!-- Home - Always visible -->
    <a mat-button (click)="goHome()">Home</a>

    <!-- About - Show only when NOT logged in -->
    <a mat-button routerLink="/about" *ngIf="!isLoggedIn">About</a>

    <!-- Register - Show only when NOT logged in -->
    <a mat-button routerLink="/register" *ngIf="!isLoggedIn">Register</a>

    <!-- Login - Show only when NOT logged in -->
    <a mat-button routerLink="/login" *ngIf="!isLoggedIn">Login</a>

    <!-- User info and Logout - Show only when logged in -->
    <ng-container *ngIf="isLoggedIn">

        <!-- User name display -->
        <span class="user-name">{{ userFullName }}</span>

        <!-- Logout button -->
        <a mat-button (click)="logout()" style="cursor: pointer;">
            <mat-icon>logout</mat-icon>
            Logout
        </a>
    </ng-container>

</mat-toolbar>
